name: Build x86_64
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (ej: v1.7.5)'
        required: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout mcpelauncher-bins (pack.sh + prebuilt)
        uses: actions/checkout@v4
        with:
          repository: PlaGaPlusDev/mcpelauncher-bins
          ref: main
          path: bins

      - name: Checkout mcpelauncher-manifest
        uses: actions/checkout@v4
        with:
          repository: PlaGaPlusDev/mcpelauncher-manifest
          ref: ng
          submodules: recursive
          path: manifest

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build clang llvm \
            libssl-dev \
            libegl1-mesa-dev libgles2-mesa-dev libgl1-mesa-dev \
            libx11-dev libxext-dev libxrandr-dev libxrender-dev \
            libxcursor-dev libxi-dev libxfixes-dev libxinerama-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libpng-dev libjpeg-dev \
            libudev-dev libevdev-dev \
            libdbus-1-dev libfontconfig-dev libfreetype-dev \
            zlib1g-dev \
            libgbm-dev libdrm-dev libglu1-mesa-dev \
            qt6-base-dev qt6-webengine-dev qt6-declarative-dev \
            libpulse-dev libasound2-dev

      - name: Configure & Build
        working-directory: manifest
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
          cmake --build build

      - name: Build mod stub
        run: |
          mkdir -p stub
          touch stub/empty.c
          gcc -shared -nostartfiles -fPIC -o stub/libmcpelauncher_mod.so stub/empty.c \
            -Wl,-soname,libmcpelauncher_mod.so -s

      - name: Pack binaries
        working-directory: bins
        run: |
          VERSION="${{ github.event.inputs.version }}"
          rm -rf bin libs_mc
          mkdir -p bin libs_mc/lib/x86_64

          BUILD="../manifest/build"
          STUB="../stub"

          # Del manifest compilado
          cp "$BUILD/mcpelauncher-client/mcpelauncher-client"     bin/
          cp "$BUILD/mcpelauncher-webview/mcpelauncher-webview"   bin/
          cp "$BUILD/mcpelauncher-errorwindow/mcpelauncher-error" bin/
          # Mod stub (dlopen'ed by launcher)
          cp "$STUB/libmcpelauncher_mod.so"                       libs_mc/lib/x86_64/
          cp "$BUILD/gamecontrollerdb/gamecontrollerdb.txt"       libs_mc/

          # msa-daemon (no se compila desde el manifest; opcional)
          [ -f "$BUILD/mcpelauncher-client/msa-daemon" ] && cp "$BUILD/mcpelauncher-client/msa-daemon" bin/

          # Pre-compilados del UI manifest
          cp prebuilt/* bin/

          cat > bin/info.txt << EOF
          VERSION: ${VERSION#v} (Release)
          COMPILED: $(date -u +%Y%m%d-%H%M%S)
          REPO: https://github.com/PlaGaPlusDev/mcpelauncher-manifest
          ARCH: x86_64
          EOF

          ./pack.sh "$VERSION"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: bins/mcpelauncher_bins-*.tar.gz
